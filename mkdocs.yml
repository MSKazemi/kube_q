site_name: kube-q
site_description: Chat with your Kubernetes cluster from the terminal.
site_url: https://mskazemi.github.io/kube_q/
repo_url: https://github.com/MSKazemi/kube_q
repo_name: MSKazemi/kube_q
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - CLI Reference: cli-reference.md
  - Configuration: configuration.md
  - In-REPL Commands: commands.md
  - Features:
      - File Attachments: file-attachments.md
      - Session History: session-history.md
      - Token Tracking: token-tracking.md
      - Human-in-the-Loop: hitl.md
  - Web UI: web-ui.md
  - Python SDK: sdk.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MSKazemi/kube_q
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/kube-q/
